<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign Up | FractureOrSprain?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/css/styles.css"/>
    <script src="../assets/js/tailwind-config.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md antialiased overflow-x-hidden">
    <!-- Sign Up Section -->
    <section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-surface-bright to-surface-container-low px-margin-mobile md:px-margin-desktop py-12">
        <div class="w-full max-w-md">
            <!-- Logo/Brand -->
            <div class="text-center mb-stack-lg">
                <a href="../index.html" class="inline-flex items-center gap-2 font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed mb-2">
                    <span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
                </a>
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create Account</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">
                    Join FractureOrSprain? for personalized health assessments
                </p>
            </div>

            <!-- Sign Up Card -->
            <div class="bg-surface-container-lowest rounded-2xl shadow-ambient border border-outline-variant/30 p-8">
                <form id="signup-form" class="space-y-6">
                    <!-- Username Field -->
                    <div>
                        <label for="username" class="block font-label-md text-label-md text-on-surface mb-2">
                            Username
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            placeholder="Choose a username"
                            required
                            minlength="3"
                            class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-md text-body-md transition-all"
                        />
                        <p class="mt-1 font-body-sm text-body-sm text-on-surface-variant">
                            At least 3 characters
                        </p>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block font-label-md text-label-md text-on-surface mb-2">
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            placeholder="your.email@example.com"
                            required
                            class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-md text-body-md transition-all"
                        />
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block font-label-md text-label-md text-on-surface mb-2">
                            Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                placeholder="Create a strong password"
                                required
                                minlength="8"
                                class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-md text-body-md transition-all"
                            />
                            <button 
                                type="button"
                                onclick="togglePassword('password')"
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors"
                            >
                                <span class="material-symbols-outlined" id="password-icon">visibility</span>
                            </button>
                        </div>
                        <p class="mt-1 font-body-sm text-body-sm text-on-surface-variant">
                            At least 8 characters
                        </p>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label for="confirm-password" class="block font-label-md text-label-md text-on-surface mb-2">
                            Confirm Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="confirm-password" 
                                name="confirm-password"
                                placeholder="Re-enter your password"
                                required
                                minlength="8"
                                class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-md text-body-md transition-all"
                            />
                            <button 
                                type="button"
                                onclick="togglePassword('confirm-password')"
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors"
                            >
                                <span class="material-symbols-outlined" id="confirm-password-icon">visibility</span>
                            </button>
                        </div>
                        <div id="password-match-message" class="mt-1 font-body-sm text-body-sm hidden"></div>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="bg-surface-container-high p-4 rounded-xl">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input 
                                type="checkbox" 
                                id="terms"
                                required
                                class="w-4 h-4 mt-1 rounded border-outline-variant text-primary focus:ring-2 focus:ring-primary/20 transition-all flex-shrink-0"
                            />
                            <span class="font-body-sm text-body-sm text-on-surface-variant">
                                I agree to the 
                                <a href="../pages/policies/terms-of-service.html" class="text-primary hover:underline">Terms of Service</a> 
                                and 
                                <a href="../pages/policies/privacy-policy.html" class="text-primary hover:underline">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <!-- Sign Up Button -->
                    <button 
                        type="submit"
                        class="w-full bg-primary-container text-on-primary px-8 py-3 rounded-xl font-label-md text-label-md hover:bg-surface-tint transition-all shadow-ambient flex items-center justify-center gap-2"
                    >
                        Create Account
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                    </button>

                    <!-- Divider -->
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-outline-variant"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-surface-container-lowest font-body-sm text-body-sm text-on-surface-variant">
                                Already have an account?
                            </span>
                        </div>
                    </div>

                    <!-- Login Link -->
                    <div class="text-center">
                        <a 
                            href="login.html" 
                            class="inline-flex items-center gap-2 border border-outline-variant text-on-surface px-8 py-3 rounded-xl font-label-md text-label-md hover:bg-surface-container transition-all"
                        >
                            Sign In
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script type="module">
        console.log('📦 Loading signup.html script...');
        
        import { signUpUser, signInUser } from '../assets/js/auth.js';
        console.log('✅ signUpUser imported:', typeof signUpUser);
        console.log('✅ signInUser imported:', typeof signInUser);

        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(fieldId + '-icon');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                field.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Make togglePassword available globally
        window.togglePassword = togglePassword;

        // Password match validation
        document.getElementById('confirm-password').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            const messageDiv = document.getElementById('password-match-message');
            
            if (confirmPassword.length > 0) {
                if (password === confirmPassword) {
                    messageDiv.textContent = '✓ Passwords match';
                    messageDiv.className = 'mt-1 font-body-sm text-body-sm text-primary';
                    messageDiv.classList.remove('hidden');
                } else {
                    messageDiv.textContent = '✗ Passwords do not match';
                    messageDiv.className = 'mt-1 font-body-sm text-body-sm text-error';
                    messageDiv.classList.remove('hidden');
                }
            } else {
                messageDiv.classList.add('hidden');
            }
        });

        // Show loading state
        function showLoading(button) {
            button.disabled = true;
            button.innerHTML = `
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                Creating account...
            `;
        }

        // Reset button state
        function resetButton(button) {
            button.disabled = false;
            button.innerHTML = `
                Create Account
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
            `;
        }

        // Handle signup form submission
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            console.log('🔴 FORM SUBMITTED!');
            e.preventDefault();
            console.log('🔴 Default prevented');
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const termsAccepted = document.getElementById('terms').checked;
            const submitButton = this.querySelector('button[type="submit"]');
            
            console.log('🔴 Form values:', { username, email, password: '***', termsAccepted });
            
            // Validation
            if (!username || !email || !password || !confirmPassword) {
                console.log('❌ Validation failed: missing fields');
                alert('Please fill in all fields');
                return;
            }

            if (username.length < 3) {
                console.log('❌ Validation failed: username too short');
                alert('Username must be at least 3 characters long');
                return;
            }

            // Username validation (alphanumeric and underscore only)
            const usernameRegex = /^[a-zA-Z0-9_]+$/;
            if (!usernameRegex.test(username)) {
                console.log('❌ Validation failed: invalid username format');
                alert('Username can only contain letters, numbers, and underscores');
                return;
            }

            if (password.length < 8) {
                console.log('❌ Validation failed: password too short');
                alert('Password must be at least 8 characters long');
                return;
            }

            if (password !== confirmPassword) {
                console.log('❌ Validation failed: passwords do not match');
                alert('Passwords do not match');
                return;
            }

            if (!termsAccepted) {
                console.log('❌ Validation failed: terms not accepted');
                alert('Please accept the Terms of Service and Privacy Policy');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                console.log('❌ Validation failed: invalid email format');
                alert('Please enter a valid email address');
                return;
            }

            console.log('✅ All validation passed');

            // Show loading state
            showLoading(submitButton);

            // Attempt to sign up with Firebase
            try {
                console.log('🔴 About to call signUpUser function...');
                console.log('🔴 signUpUser function exists?', typeof signUpUser);
                
                if (typeof signUpUser !== 'function') {
                    throw new Error('signUpUser function not loaded');
                }
                
                const result = await signUpUser(username, email, password);
                
                console.log('🔴 signUpUser returned:', result);
                
                if (result.success) {
                    // Success! Show message and redirect
                    console.log('✅ SIGNUP SUCCESS!');
                    console.log('User UID:', result.user?.uid);
                    console.log('User Email:', result.user?.email);
                    
                    // Verify in Firebase Console:
                    console.log('🔍 VERIFICATION:');
                    console.log('1. Open Firebase Authentication: https://console.firebase.google.com/project/csp-c0aad/authentication/users');
                    console.log('2. Look for user:', email);
                    console.log('3. Open Firestore: https://console.firebase.google.com/project/csp-c0aad/firestore/data');
                    console.log('4. Check users collection for UID:', result.user?.uid);
                    
                    // Auto-login the user and redirect to home
                    console.log('🔄 Auto-logging in user...');
                    const loginResult = await signInUser(username, password);
                    
                    if (loginResult.success) {
                        console.log('✅ AUTO-LOGIN SUCCESS! Redirecting to home page...');
                        alert('Account created successfully! Welcome!');
                        window.location.href = '../index.html';
                    } else {
                        console.log('⚠️ Auto-login failed, redirecting to manual login...');
                        alert('Account created successfully! Please sign in.');
                        window.location.href = 'login.html';
                    }
                } else {
                    // Show error message
                    let errorMessage = result.error;
                    console.error('❌ Signup failed with error:', errorMessage);
                    
                    // Customize error messages
                    if (errorMessage.includes('email-already-in-use')) {
                        errorMessage = 'This email is already registered. Please sign in instead.';
                    } else if (errorMessage.includes('weak-password')) {
                        errorMessage = 'Password is too weak. Please use a stronger password.';
                    } else if (errorMessage.includes('invalid-email')) {
                        errorMessage = 'Invalid email address format.';
                    } else if (errorMessage.includes('network-request-failed')) {
                        errorMessage = 'Network error. Check your internet connection.';
                    } else if (errorMessage.includes('Username mapping')) {
                        errorMessage = 'Failed to create username. ' + errorMessage + '\n\nYou can still create your account and login with email instead.';
                    }
                    
                    alert(`Sign up failed: ${errorMessage}`);
                    resetButton(submitButton);
                }
            } catch (error) {
                console.error('❌ Unexpected signup error:', error);
                console.error('Error stack:', error.stack);
                alert(`Unexpected error: ${error.message}`);
                resetButton(submitButton);
            }
        });
    </script>
</body>
</html>
